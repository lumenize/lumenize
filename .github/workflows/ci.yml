name: CI

on:
  pull_request:
    branches:
      - main
  # TEMP (experiment): run CI on pushes to this feature branch so we can get a
  # green run on GitHub's hardware without opening a PR into main. Revert after.
  push:
    branches:
      - feat/nebula-studio

jobs:
  audit-test-mode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Audit TEST_MODE leak surfaces
        run: ./scripts/audit-test-mode.sh

  run-packages-tests-with-coverage:
    runs-on: ubuntu-latest
    env:
      # pool-workers' remote proxy (for the EMAIL / Cloudflare Email Sending
      # binding the auth e2e + hono suites use) authenticates to Cloudflare via
      # these. Node-side process env, not worker bindings.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: ''  # Disable built-in npm caching to avoid conflicts

      - name: Reconstruct .dev.vars from secrets (worker bindings for e2e suites)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_TOKEN: ${{ secrets.TEST_TOKEN }}
        run: |
          # RESEND_API_KEY + TEST_TOKEN are worker bindings the auth e2e suites
          # read from .dev.vars (symlinked into each test dir by postinstall in
          # the `npm ci` step below — so this must precede it). Written to a file,
          # never stdout; GitHub also masks these secrets in logs.
          {
            printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY"
            printf 'TEST_TOKEN=%s\n' "$TEST_TOKEN"
          } > .dev.vars

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install dependencies (skip optional to avoid Rollup bug)
        run: npm ci --no-optional

      - name: Explicitly install Rollup Linux binary (after npm ci)
        run: npm install --no-save @rollup/rollup-linux-x64-gnu

      - name: Run tests with coverage for all packages
        run: |
          # Run vitest with coverage for all packages in packages/ directory
          for dir in packages/*/; do
            if [ -f "$dir/package.json" ] && [ -f "$dir/vitest.config.js" ]; then
              echo "Running tests with coverage for $(basename $dir)..."
              cd "$dir"
              npm run test -- --coverage || exit 1
              cd - > /dev/null
            fi
          done

  run-doc-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: ''  # Disable built-in npm caching to avoid conflicts

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install dependencies (skip optional to avoid Rollup bug)
        run: npm ci --no-optional

      - name: Explicitly install Rollup Linux binary (after npm ci)
        run: npm install --no-save @rollup/rollup-linux-x64-gnu

      - name: Run doc-test examples (no coverage)
        run: |
          # Run tests for all doc-test subdirectories without coverage
          for dir in doc-test/*/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Running tests for $(basename $(dirname $dir))/$(basename $dir)..."
              cd "$dir"
              npm run test || exit 1
              cd - > /dev/null
            fi
          done

  sonarcloud-analysis:
    needs: [run-packages-tests-with-coverage, run-doc-tests]
    uses: ./.github/workflows/reusable-on-success.yml
    secrets: inherit

