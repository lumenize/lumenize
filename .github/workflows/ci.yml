name: CI

on:
  pull_request:
    branches:
      - main
  # TEMP (experiment): run CI on pushes to this feature branch so we can get a
  # green run on GitHub's hardware without opening a PR into main. Revert after.
  push:
    branches:
      - feat/nebula-studio

jobs:
  audit-test-mode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Audit TEST_MODE leak surfaces
        run: ./scripts/audit-test-mode.sh

  run-packages-tests-with-coverage:
    runs-on: ubuntu-latest
    env:
      # pool-workers' remote proxy (for the EMAIL / Cloudflare Email Sending
      # binding the auth e2e + hono suites use) authenticates to Cloudflare via
      # these. Node-side process env, not worker bindings.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: ''  # Disable built-in npm caching to avoid conflicts

      - name: Reconstruct .dev.vars from secrets (worker bindings for e2e suites)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_TOKEN: ${{ secrets.TEST_TOKEN }}
        # Writes .dev.vars (secrets + generated ephemeral JWT keys + non-secret
        # test config) BEFORE npm ci so postinstall symlinks it into each test
        # dir as worker bindings. See scripts/ci-write-dev-vars.mjs.
        run: node scripts/ci-write-dev-vars.mjs

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install dependencies (skip optional to avoid Rollup bug)
        run: npm ci --no-optional

      - name: Explicitly install Rollup + SWC Linux bindings (after npm ci)
        run: |
          # --no-optional (above) strips these platform-specific native deps;
          # re-add the Linux ones explicitly. SWC's binding (used by fetch/mesh
          # decorator transforms) must match the installed @swc/core version.
          npm install --no-save @rollup/rollup-linux-x64-gnu
          npm install --no-save "@swc/core-linux-x64-gnu@$(node -p 'require("@swc/core/package.json").version')"

      - name: Install Playwright chromium (mesh real-browser project)
        run: npx playwright install --with-deps chromium

      - name: Build ts-runtime-parser-validator bundle (gitignored dist artifact)
        # esbuild-bundles typia+typescript into dist/deps.bundle.mjs for in-worker
        # type parsing. dist/ is gitignored and not built by npm ci, so the whole
        # package's tests fail with "Cannot find module ../dist/deps.bundle.mjs".
        run: npm run bundle -w @lumenize/ts-runtime-parser-validator

      - name: Run tests with coverage for all packages
        run: |
          # Run vitest with coverage for every package. Run-all-then-fail: a flake
          # in one package must not mask the packages after it (collect failures,
          # fail at the end). --retry=2 self-heals cold-start flakes on the
          # over-the-web e2e suites (deployed test-endpoints / email infra); the
          # suites are made retry-safe (unique per-run instance names) so a retry
          # can't accumulate state. Real failures still fail all 3 attempts.
          failed=""
          for dir in packages/*/; do
            if [ -f "$dir/package.json" ] && [ -f "$dir/vitest.config.js" ]; then
              echo "Running tests with coverage for $(basename $dir)..."
              cd "$dir"
              npm run test -- --coverage --retry=2 || failed="$failed $(basename "$dir")"
              cd - > /dev/null
            fi
          done
          if [ -n "$failed" ]; then echo "❌ Failed packages:$failed"; exit 1; fi

  run-doc-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: ''  # Disable built-in npm caching to avoid conflicts

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install dependencies (skip optional to avoid Rollup bug)
        run: npm ci --no-optional

      - name: Explicitly install Rollup + SWC Linux bindings (after npm ci)
        run: |
          # --no-optional (above) strips these platform-specific native deps;
          # re-add the Linux ones explicitly. SWC's binding (used by fetch/mesh
          # decorator transforms) must match the installed @swc/core version.
          npm install --no-save @rollup/rollup-linux-x64-gnu
          npm install --no-save "@swc/core-linux-x64-gnu@$(node -p 'require("@swc/core/package.json").version')"

      - name: Run doc-test examples (no coverage)
        run: |
          # Run-all-then-fail so one failing doc-test doesn't mask the rest.
          failed=""
          for dir in doc-test/*/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Running tests for $(basename $(dirname "$dir"))/$(basename "$dir")..."
              cd "$dir"
              npm run test || failed="$failed $(basename "$dir")"
              cd - > /dev/null
            fi
          done
          if [ -n "$failed" ]; then echo "❌ Failed doc-tests:$failed"; exit 1; fi

  sonarcloud-analysis:
    needs: [run-packages-tests-with-coverage, run-doc-tests]
    uses: ./.github/workflows/reusable-on-success.yml
    secrets: inherit

