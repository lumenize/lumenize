name: Reusable Workflow - On Success

on:
  workflow_call:
    # Note: GITHUB_TOKEN is automatically available via github.token - do not declare it here
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: SonarQube Cloud Scan
        # sonarcloud-github-action is deprecated; sonarqube-scan-action is the
        # current action for SonarCloud (now "SonarQube Cloud"). Its bundled
        # scanner CLI 7.x requires SONAR_HOST_URL set explicitly, otherwise JRE
        # provisioning fails with "Failed to query JRE metadata ... SONAR_TOKEN".
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

