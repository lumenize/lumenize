name: UI smoke (container + AI + login)

# The `apps/nebula` ui-smoke lane: a REAL Cloudflare Container (DevContainer image)
# under `wrangler dev` on ubuntu-latest + vite + Playwright, driving the full Studio
# loop (magic-link login → connected → AI codegen turn → preview rendered in the
# container). `extends Container` can't construct under pool-workers
# (packages/mesh/test/container/precheck.test.ts), so this is the only lane that
# exercises a real container in CI. Proven viable on a headless GHA runner 2026-06-28
# (tasks/nebula-in-ci.md Phase 1).
#
# Kept SEPARATE from ci.yml (a ~2.5-min Docker build) and PATH-FILTERED so it runs only
# on container/Studio/ui-smoke changes — never on every push. Not a required check
# unless added to branch protection. `workflow_dispatch` for manual runs.
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths: &ui-smoke-paths
      - '.github/workflows/ui-smoke.yml'
      - 'apps/nebula/container/**'
      - 'apps/nebula/src/dev-container.ts'
      - 'apps/nebula/src/dev-studio.ts'
      - 'apps/nebula/test/ui-smoke/**'
  push:
    branches: [main, feat/nebula-studio]
    paths: *ui-smoke-paths

# Cancel a superseded run when a newer commit is pushed (per-workflow, per-ref).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-smoke:
    runs-on: ubuntu-latest
    env:
      # wrangler dev authenticates the remote bindings (env.AI → Workers AI, and the
      # send_email remote:true binding the PROD apps/nebula config still carries) via
      # these. GHA has CF creds — this is the "ui-smoke in GHA" target, where the AI
      # half is still the binding (Phase 2's REST swap is for the hosted lane only).
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: ''

      - name: Confirm Docker is available (HAS_DOCKER probe = `docker info`)
        run: docker info

      - name: Reconstruct .dev.vars from secrets
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_TOKEN: ${{ secrets.TEST_TOKEN }}
        run: node scripts/ci-write-dev-vars.mjs

      - name: Add CLOUDFLARE_ACCOUNT_ID to .dev.vars (satisfies the HAS_CF_CREDS gate)
        # ui-smoke's gate greps .dev.vars for /^CLOUDFLARE_/ (test/ui-smoke/gates.ts);
        # ci-write-dev-vars.mjs doesn't write one. The account ID is a non-secret
        # identifier — adding it flips HAS_CF_CREDS true so the lane actually runs.
        run: echo "CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}" >> .dev.vars

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install dependencies (skip optional to avoid Rollup bug)
        run: npm ci --no-optional

      - name: Explicitly install Rollup + SWC + lightningcss Linux bindings (after npm ci)
        # --no-optional (above) strips platform-specific native deps; re-add the Linux
        # ones. ONE combined `npm install` — separate sequential installs prune each
        # other's --no-save'd optionals (the lightningcss install was wiping the swc
        # binding the prior line added), so request all three at once. ui-smoke needs
        # lightningcss too (it spawns vite against nebula-studio-ui; the packages job
        # never runs vite, so it only needed rollup+swc). lightningcss's `exports`
        # blocks require() of its package.json, so read the version off disk.
        run: |
          SWC_VER=$(node -p 'require("@swc/core/package.json").version')
          LCSS_VER=$(node -p "JSON.parse(require('fs').readFileSync('node_modules/lightningcss/package.json','utf8')).version")
          npm install --no-save \
            @rollup/rollup-linux-x64-gnu \
            "@swc/core-linux-x64-gnu@${SWC_VER}" \
            "lightningcss-linux-x64-gnu@${LCSS_VER}"

      - name: Install Playwright chromium (ui-smoke drives a real browser)
        run: npx playwright install --with-deps chromium

      - name: Build ts-runtime-parser-validator bundle (gitignored dist artifact)
        run: npm run bundle -w @lumenize/ts-runtime-parser-validator

      - name: Run the ui-smoke lane (container + AI + login)
        # global-setup spawns `wrangler dev` (containers + env.AI) + vite, then
        # Playwright drives the magic-link → container → AI → preview flow. The
        # container image (./apps/nebula/container/Dockerfile) builds + boots here;
        # cold-boot budget is 120s. The lane self-gates (describe.runIf) on Docker +
        # AI-path + email creds — if any is absent it skips cleanly; check the log for
        # "skipped" vs a real failure.
        working-directory: apps/nebula
        run: npx vitest run --project ui-smoke
