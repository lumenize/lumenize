name: Deploy container worker (manual)

# Manual, targeted deploy of a single container-enabled Worker. Runs ONLY `wrangler deploy`
# — no test suite — so it is independent of the (currently red) CI tests.
#
# Why this exists: deploying a Cloudflare Container builds the image locally then PUSHES it to
# registry.cloudflare.com. From some local networks that push severs large image layers
# mid-upload (broken pipe), and no local container tooling fixes it — it's the network path,
# not Docker (see experiments/container-vite-spike/FINDINGS.md + memory cf-container-deploy-proxy).
# GitHub's runners have a clean, fast path to the CF registry, so the push succeeds here.
#
# Prerequisites (one-time, done by a human — I can't set these):
#   1. Repo secrets (Settings → Secrets and variables → Actions):
#        CLOUDFLARE_API_TOKEN  — a token with Workers Scripts:Edit (+ Workers/Containers perms)
#        CLOUDFLARE_ACCOUNT_ID — the target account id
#   2. This file must exist on the DEFAULT branch (main) for the "Run workflow" button /
#        `gh workflow run` to be available; it can then be run against any branch via the
#        "Use workflow from" branch selector.

on:
  workflow_dispatch:
    inputs:
      working_directory:
        description: "Directory containing the wrangler.jsonc to deploy"
        required: true
        default: "experiments/container-vite-spike"
  # TEMPORARY (testing only): lets us validate the deploy from feat/nebula-studio without
  # first landing this file on the default branch (which workflow_dispatch requires). Scoped
  # to changes of THIS file so it doesn't fire on unrelated pushes. Remove once verified.
  push:
    branches: [feat/nebula-studio]
    paths: ['.github/workflows/deploy-container.yml']

jobs:
  deploy:
    runs-on: ubuntu-latest  # has Docker preinstalled, used by wrangler to build + push the image
    steps:
      - name: Checkout (the selected branch)
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # `npm install` (not `ci`) tolerates lockfile drift across branches; CI installs are ephemeral.
      - name: Install dependencies
        run: npm install --no-optional --no-audit --no-fund

      - name: Deploy with wrangler (builds + pushes the container image, then rolls out)
        # Falls back to the spike dir for the push trigger (where inputs are empty).
        working-directory: ${{ inputs.working_directory || 'experiments/container-vite-spike' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
